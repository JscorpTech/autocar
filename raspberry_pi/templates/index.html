<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d1117">
  <title>AutoCar Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- ═══════════════════════════════════════ TOP BAR ═══ -->
<header class="topbar">
  <div class="topbar-brand">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <rect x="2" y="7" width="20" height="11" rx="3"/>
      <circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/>
      <path d="M7 7V5a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v2"/>
      <line x1="12" y1="10" x2="12" y2="15"/>
    </svg>
    <span class="brand-name">AUTOCAR</span>
  </div>

  <div class="topbar-center">
    <div class="status-chip" id="statusChip" data-status="idle">
      <span class="status-dot"></span>
      <span class="status-label" id="statusLabel">Idle</span>
    </div>
  </div>

  <div class="topbar-right">
    <span class="badge badge-sim hidden" id="simBadge">SIM</span>
    <div class="conn-badge" id="connBadge" data-connected="false">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
        <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <circle cx="12" cy="20" r="1"/>
      </svg>
      <span id="connText">Offline</span>
    </div>
  </div>
</header>

<!-- ═══════════════════════════════════════ WORKSPACE ═══ -->
<div class="workspace">

  <!-- ─── LEFT PANEL ─── -->
  <aside class="panel panel-left">

    <!-- Map -->
    <section class="card">
      <div class="card-header">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"/><path d="M8 2v16"/><path d="M16 6v16"/>
        </svg>
        Map
      </div>
      <div class="card-body">
        <select id="mapSelect" class="input-select">
          <option value="">Select map...</option>
        </select>
        <div class="btn-row">
          <button id="btnLoadMap" class="btn btn-primary" disabled>Load</button>
          <button id="btnFindPath" class="btn btn-default" disabled>Find Path</button>
        </div>
        <label class="upload-btn">
          <input type="file" id="fileInput" accept=".json" hidden>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/>
            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
          </svg>
          Upload JSON
        </label>
      </div>
    </section>

    <!-- Navigation -->
    <section class="card">
      <div class="card-header">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="3 11 22 2 13 21 11 13 3 11"/>
        </svg>
        Navigation
      </div>
      <div class="card-body">
        <div class="btn-row">
          <button id="btnStart" class="btn btn-success btn-full" disabled>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Start
          </button>
          <button id="btnStop" class="btn btn-warning btn-full" disabled>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
              <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
            </svg>
            Stop
          </button>
        </div>
        <button id="btnEmergency" class="btn btn-danger btn-full btn-emergency">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <octagon cx="12" cy="12" r="10"/>
            <line x1="4.9" y1="4.9" x2="19.1" y2="19.1"/>
            <circle cx="12" cy="12" r="10"/>
            <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
          </svg>
          EMERGENCY STOP
        </button>
        <button id="btnResetEnc" class="btn btn-ghost btn-sm">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
          Reset Encoders
        </button>

        <div id="progressSection" class="progress-section hidden">
          <div class="progress-meta">
            <span>Waypoint</span>
            <span id="progressText">0 / 0</span>
          </div>
          <div class="progress-track">
            <div class="progress-bar" id="progressBar" style="width:0%"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Manual Control -->
    <section class="card">
      <div class="card-header">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="6" width="20" height="12" rx="2"/>
          <circle cx="8" cy="12" r="2"/><circle cx="16" cy="12" r="2"/>
        </svg>
        Manual Control
      </div>
      <div class="card-body">
        <div class="joystick-zone" id="joystickZone"></div>
        <div class="speed-row">
          <span class="speed-label">Speed</span>
          <input type="range" id="speedSlider" min="80" max="220" value="150" class="slider">
          <span class="speed-val" id="speedVal">150</span>
        </div>
        <p class="control-hint">Drag to drive &middot; WASD / Arrow keys &middot; Space = stop</p>
      </div>
    </section>

  </aside>

  <!-- ─── CENTER: MAP ─── -->
  <main class="panel panel-center">
    <canvas id="mapCanvas"></canvas>
    <div class="map-empty" id="mapEmpty">
      <div class="map-empty-inner">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.25">
          <path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"/>
          <path d="M8 2v16"/><path d="M16 6v16"/>
        </svg>
        <p>Select and load a map</p>
        <span>Use the Map panel on the left</span>
      </div>
    </div>
  </main>

  <!-- ─── RIGHT PANEL ─── -->
  <aside class="panel panel-right">

    <!-- Compass -->
    <section class="card">
      <div class="card-header">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>
        </svg>
        Heading
      </div>
      <div class="card-body compass-body">
        <svg class="compass-svg" viewBox="0 0 200 200" id="compassSvg">
          <!-- Background rings -->
          <circle cx="100" cy="100" r="95" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
          <circle cx="100" cy="100" r="86" fill="none" stroke="#30363d" stroke-width="0.5"/>
          <!-- Tick marks group -->
          <g id="compassTicks"></g>
          <!-- Cardinal labels (fixed) -->
          <text x="100" y="15" text-anchor="middle" class="compass-cardinal north-label">N</text>
          <text x="188" y="104" text-anchor="middle" class="compass-cardinal">E</text>
          <text x="100" y="195" text-anchor="middle" class="compass-cardinal">S</text>
          <text x="12" y="104" text-anchor="middle" class="compass-cardinal">W</text>
          <!-- Inner face -->
          <circle cx="100" cy="100" r="66" fill="#0d1117" stroke="#21262d" stroke-width="0.5"/>
          <!-- Needle (rotates) -->
          <g id="compassNeedle">
            <polygon points="100,36 96.5,100 103.5,100" fill="#ef4444"/>
            <polygon points="100,164 96.5,100 103.5,100" fill="#374151"/>
          </g>
          <!-- Center pin -->
          <circle cx="100" cy="100" r="5" fill="#161b22" stroke="#6b7280" stroke-width="1.5"/>
          <!-- Heading readout -->
          <text id="compassHeading" x="100" y="130" text-anchor="middle" class="compass-heading">0.0°</text>
        </svg>
      </div>
    </section>

    <!-- Sensor View -->
    <section class="card">
      <div class="card-header">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2a10 10 0 1 0 0 20"/>
          <path d="M12 6a6 6 0 1 0 0 12"/>
          <path d="M12 10a2 2 0 1 0 0 4"/>
        </svg>
        Sensors
      </div>
      <div class="card-body sensor-body">
        <svg class="sensor-svg" viewBox="0 0 240 342" id="sensorSvg">
          <!-- Sensor beams (rendered BEHIND car body) -->
          <polygon id="beam-front" class="beam beam-none" points="120,67 120,67 120,67"/>
          <polygon id="beam-fl"    class="beam beam-none" points="82,101 82,101 82,101"/>
          <polygon id="beam-fr"    class="beam beam-none" points="158,101 158,101 158,101"/>
          <polygon id="beam-left"  class="beam beam-none" points="82,171 82,171 82,171"/>
          <polygon id="beam-right" class="beam beam-none" points="158,171 158,171 158,171"/>
          <polygon id="beam-rear"  class="beam beam-none" points="120,275 120,275 120,275"/>

          <!-- Car body group -->
          <g id="carBody">
            <!-- Main chassis -->
            <rect id="carBodyRect" x="82" y="67" width="76" height="208" rx="14"
                  fill="#1a2035" stroke="#2d3a5c" stroke-width="1.5"/>
            <!-- Front windshield -->
            <rect x="91" y="78" width="58" height="34" rx="6"
                  fill="#0f1828" stroke="#1e3052" stroke-width="1" opacity="0.9"/>
            <!-- Rear windshield -->
            <rect x="91" y="230" width="58" height="26" rx="5"
                  fill="#0f1828" stroke="#1e3052" stroke-width="1" opacity="0.9"/>
            <!-- Hood panel -->
            <rect x="91" y="67" width="58" height="14" rx="4"
                  fill="#222c45" stroke="none"/>
            <!-- Trunk panel -->
            <rect x="91" y="261" width="58" height="14" rx="4"
                  fill="#222c45" stroke="none"/>
            <!-- Center line -->
            <line x1="120" y1="82" x2="120" y2="260" stroke="#1e2d4a" stroke-width="0.8" stroke-dasharray="5,4"/>
            <!-- Wheels FL -->
            <rect x="62" y="82" width="23" height="44" rx="6"
                  fill="#111827" stroke="#374151" stroke-width="1.2"/>
            <rect x="65" y="87" width="17" height="34" rx="4" fill="#0d1117" opacity="0.6"/>
            <!-- Wheels FR -->
            <rect x="155" y="82" width="23" height="44" rx="6"
                  fill="#111827" stroke="#374151" stroke-width="1.2"/>
            <rect x="158" y="87" width="17" height="34" rx="4" fill="#0d1117" opacity="0.6"/>
            <!-- Wheels RL -->
            <rect x="62" y="216" width="23" height="44" rx="6"
                  fill="#111827" stroke="#374151" stroke-width="1.2"/>
            <rect x="65" y="221" width="17" height="34" rx="4" fill="#0d1117" opacity="0.6"/>
            <!-- Wheels RR -->
            <rect x="155" y="216" width="23" height="44" rx="6"
                  fill="#111827" stroke="#374151" stroke-width="1.2"/>
            <rect x="158" y="221" width="17" height="34" rx="4" fill="#0d1117" opacity="0.6"/>
          </g>

          <!-- Distance labels (positioned by JS) -->
          <text id="lbl-front" class="sensor-lbl" x="120" y="30" text-anchor="middle">—</text>
          <text id="lbl-fl"    class="sensor-lbl" x="40"  y="55" text-anchor="middle">—</text>
          <text id="lbl-fr"    class="sensor-lbl" x="200" y="55" text-anchor="middle">—</text>
          <text id="lbl-left"  class="sensor-lbl" x="15"  y="174" text-anchor="middle">—</text>
          <text id="lbl-right" class="sensor-lbl" x="225" y="174" text-anchor="middle">—</text>
          <text id="lbl-rear"  class="sensor-lbl" x="120" y="326" text-anchor="middle">—</text>
        </svg>
      </div>
    </section>

    <!-- Telemetry -->
    <section class="card">
      <div class="card-header">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
        Telemetry
      </div>
      <div class="card-body">
        <div class="tele-grid">
          <div class="tele-tile">
            <span class="tele-label">ENC L</span>
            <span class="tele-value" id="teleEncL">0</span>
          </div>
          <div class="tele-tile">
            <span class="tele-label">ENC R</span>
            <span class="tele-value" id="teleEncR">0</span>
          </div>
          <div class="tele-tile">
            <span class="tele-label">RPM L</span>
            <span class="tele-value" id="teleRpmL">0.0</span>
          </div>
          <div class="tele-tile">
            <span class="tele-label">RPM R</span>
            <span class="tele-value" id="teleRpmR">0.0</span>
          </div>
        </div>
      </div>
    </section>

  </aside>
</div>

<!-- ═══════════════════════════════════════ LOG PANEL ═══ -->
<div class="log-panel" id="logPanel">
  <div class="log-header" id="logHeader">
    <div class="log-title">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      Log
    </div>
    <span class="log-preview" id="logPreview">—</span>
    <div class="log-actions">
      <button class="btn-icon" id="btnClearLog" title="Clear log">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6"/><path d="M14 11v6"/>
          <path d="M9 6V4h6v2"/>
        </svg>
      </button>
      <svg class="log-chevron" id="logChevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="18 15 12 9 6 15"/>
      </svg>
    </div>
  </div>
  <div class="log-body" id="logBody"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.2/nipplejs.min.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
